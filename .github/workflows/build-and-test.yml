name: Build and Test

on:
  workflow_dispatch:
  push:
    branches: [master]
    paths-ignore:
      - '**/*.md'
      - 'docs/**'
      - '.gitignore'
      - 'worklog'
      - 'log'
      - '.claude/**'
  pull_request:
    branches: [master]
    types: [opened, synchronize, reopened, ready_for_review]
    paths-ignore:
      - '**/*.md'
      - 'docs/**'
      - '.gitignore'
      - 'worklog'
      - 'log'
      - '.claude/**'

# Cancel superseded PR runs (each push to the same PR cancels the prior run).
# Master pushes keep their full audit trail by using a per-event-name group key
# and disabling cancel-in-progress for non-PR events.
concurrency:
  group: build-and-test-${{ github.event_name }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

env:
  SCHEME: WXYC
  TEST_PLAN: WXYC
  DESTINATION: platform=iOS Simulator,name=iPhone 16 Pro

jobs:
  build-and-test:
    # Skip drafts — they re-fire on `ready_for_review`. workflow_dispatch and
    # push events have no pull_request context, so the OR keeps them firing.
    if: github.event_name != 'pull_request' || github.event.pull_request.draft == false
    runs-on: macos-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive
          token: ${{ secrets.SUBMODULE_TOKEN }}
          # fetch-depth: 0 is required for affected-tests.sh's merge-base diff.
          # A shallower clone (e.g., 50) loses the merge-base when origin/master
          # has advanced more than depth-N commits ahead of the branch's fork
          # point, causing `git diff "$BASE_REF"...HEAD` to fail and the script
          # to fall through to run-all.
          fetch-depth: 0

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_26.2.app/Contents/Developer

      - name: Set up Swift macro trust
        run: |
          mkdir -p ~/Library/org.swift.swiftpm/security/
          cp ci_scripts/macros.json ~/Library/org.swift.swiftpm/security/

      - name: Cache SwiftPM artifacts
        uses: actions/cache@v4
        with:
          path: |
            ~/Library/Caches/org.swift.swiftpm
            ~/Library/Developer/Xcode/DerivedData/**/SourcePackages
            WXYC.xcodeproj/project.xcworkspace/xcshareddata/swiftpm
          key: spm-${{ runner.os }}-${{ hashFiles('**/Package.resolved') }}
          restore-keys: |
            spm-${{ runner.os }}-

      - name: Cache DerivedData
        # Key intentionally excludes github.sha and *.pbxproj. Including the SHA
        # made the primary key a guaranteed miss on every push; the prefix-
        # fallback restore-keys couldn't compensate because master never wrote
        # a cache that matched. pbxproj was too aggressive an invalidator —
        # most pbxproj edits don't affect compilation. Master pushes now warm
        # a key PRs can restore.
        uses: actions/cache@v4
        with:
          path: ~/Library/Developer/Xcode/DerivedData
          key: derived-${{ runner.os }}-${{ hashFiles('**/Package.resolved', '**/*.xcconfig') }}
          restore-keys: |
            derived-${{ runner.os }}-

      - name: Determine affected tests
        id: affected
        shell: zsh {0}
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            export BASE_REF="origin/${{ github.event.pull_request.base.ref }}"
          fi
          zsh .github/scripts/affected-tests.sh

      - name: Build for testing
        # Scoped to the affected targets so the build graph shrinks for narrow
        # PRs — xcodebuild only compiles what those test bundles transitively
        # need. On run_all (workflow_dispatch, unknown scope), only_testing_flags
        # is empty and the build covers the full scheme.
        # COMPILER_INDEX_STORE_ENABLE=NO drops index-while-building (CI doesn't
        # use it). SPM resolution runs inline as part of the build — explicit
        # Resolve step is unnecessary, and -disableAutomaticPackageResolution
        # here would fail because the workspace-level Package.resolved is git-
        # ignored and only exists after this step runs.
        run: |
          ONLY_FLAGS="${{ steps.affected.outputs.only_testing_flags }}"
          xcodebuild build-for-testing \
            -project WXYC.xcodeproj \
            -scheme "$SCHEME" \
            -destination "$DESTINATION" \
            -configuration Debug \
            -skipMacroValidation \
            COMPILER_INDEX_STORE_ENABLE=NO \
            CODE_SIGNING_ALLOWED=NO \
            $ONLY_FLAGS

      - name: Pre-boot iPhone 16 Pro simulator
        # Workaround for "The test runner hung before establishing connection."
        # Booting the simulator explicitly before running tests gives CoreSimulator
        # time to fully come up, which the implicit boot inside `xcodebuild test`
        # doesn't reliably do on macos-latest runners under load.
        run: |
          DEVICE_ID=$(xcrun simctl list devices available | grep -m1 "iPhone 16 Pro " | grep -oE '\([A-F0-9-]{36}\)' | tr -d '()')
          echo "Booting $DEVICE_ID"
          xcrun simctl boot "$DEVICE_ID" || true
          xcrun simctl bootstatus "$DEVICE_ID" -b

      - name: Run Tests (except CoreTests and UI)
        # Use -only-testing for affected runs so xcodebuild doesn't install
        # the 16 unaffected bundles onto the sim. Run-all keeps -skip-testing
        # to drop UI + CoreTests (CoreTests has its own step).
        # -onlyUsePackageVersionsFromResolvedFile stops the test step re-resolving SPM —
        # log evidence showed ~49s wasted on this per run.
        env:
          # xcodebuild strips the TEST_RUNNER_ prefix when forwarding env vars to
          # the simulator test runner process, so the .disabled(if:) traits in
          # source check the un-prefixed `WXYC_SKIP_KNOWN_FLAKES`. Scoping at the
          # step (not job) keeps this out of the Run CoreTests step, which has no
          # flake traits today — preventing accidental skip of any future CoreTests
          # suite that copies the .disabled(if:) pattern. Drop with the traits as
          # #371 retires each suite from the skip set.
          TEST_RUNNER_WXYC_SKIP_KNOWN_FLAKES: '1'
        run: |
          if [ "${{ steps.affected.outputs.run_all }}" = "true" ]; then
            ARGS="-skip-testing:WXYCUITests -skip-testing:CoreTests"
          else
            ARGS="${{ steps.affected.outputs.only_testing_flags }}"
          fi
          echo "Test args: $ARGS"

          xcodebuild test-without-building \
            -project WXYC.xcodeproj \
            -scheme "$SCHEME" \
            -testPlan "$TEST_PLAN" \
            -destination "$DESTINATION" \
            -configuration Debug \
            -skipMacroValidation \
            -onlyUsePackageVersionsFromResolvedFile \
            CODE_SIGNING_ALLOWED=NO \
            $ARGS \
            -disable-concurrent-destination-testing \
            -resultBundlePath TestResults.xcresult

      - name: Run CoreTests
        if: steps.affected.outputs.run_all == 'true' || steps.affected.outputs.run_core_tests == 'true'
        run: |
          # Run CoreTests with explicit test identifiers to avoid Swift Testing parallel execution issues.
          # When selecting an entire test bundle (e.g., -only-testing:CoreTests), Swift Testing's internal
          # parallel scheduler overwhelms CI runners. Specifying individual tests bypasses this.
          # Tracked for re-validation in #359.
          xcodebuild test-without-building \
            -project WXYC.xcodeproj \
            -scheme "$SCHEME" \
            -destination "$DESTINATION" \
            -configuration Debug \
            -skipMacroValidation \
            -onlyUsePackageVersionsFromResolvedFile \
            CODE_SIGNING_ALLOWED=NO \
            -only-testing:CoreTests/ImageCompatibilityTests/heifDataReturnsValidDataForValidImage \
            -only-testing:CoreTests/ImageCompatibilityTests/heifDataRespectsCompressionQualityParameter \
            -only-testing:CoreTests/ImageCompatibilityTests/heifDataProducesDecodableImage \
            -only-testing:CoreTests/ImageCompatibilityTests/scaledToWidthScalesLargeImages \
            -only-testing:CoreTests/ImageCompatibilityTests/scaledToWidthReturnsOriginalAtTargetWidth \
            -only-testing:CoreTests/ImageCompatibilityTests/scaledToWidthReturnsOriginalBelowTargetWidth \
            -only-testing:CoreTests/ImageCompatibilityTests/scaledToWidthMaintainsAspectRatio \
            -only-testing:CoreTests/ImageCompatibilityTests/scaledToWidthHandlesSquareImages \
            -only-testing:CoreTests/ImageCompatibilityTests/scaledToWidthHandlesTallImages \
            -only-testing:CoreTests/ImageCompatibilityTests/scaledHeifIsSmallerThanScaledPng \
            -only-testing:CoreTests/AsyncMessageTests/postAndReceive \
            -only-testing:CoreTests/AsyncMessageTests/multipleMessages \
            -only-testing:CoreTests/AsyncMessageTests/subjectFiltering \
            -only-testing:CoreTests/AsyncMessageTests/makeMessageReturnsNil \
            -only-testing:CoreTests/AsyncMessageTests/makeNotificationCreatesValidNotification \
            -only-testing:CoreTests/AsyncMessageTests/cancellationStopsReceiving \
            -only-testing:CoreTests/MainActorMessageTests/postAndReceiveViaSequence \
            -only-testing:CoreTests/MainActorMessageTests/postAndReceiveViaObserver \
            -only-testing:CoreTests/MainActorMessageTests/subjectFiltering \
            -only-testing:CoreTests/MainActorMessageTests/makeMessageReturnsNil \
            -only-testing:CoreTests/MainActorMessageTests/makeNotificationCreatesValidNotification \
            -only-testing:CoreTests/MainActorMessageTests/multipleMessages \
            -only-testing:CoreTests/DequeTests/testEmptyDeque \
            -only-testing:CoreTests/DequeTests/testAppend \
            -only-testing:CoreTests/DequeTests/testRemoveFirst \
            -only-testing:CoreTests/DequeTests/testRemoveFirstMultiple \
            -only-testing:CoreTests/DequeTests/testRemoveAll \
            -only-testing:CoreTests/DequeTests/testArrayConversion \
            -only-testing:CoreTests/DequeTests/testCopyOnWrite \
            -only-testing:CoreTests/DequeTests/testCircularBuffer \
            -only-testing:CoreTests/DequeTests/testSubscript \
            -only-testing:CoreTests/DequeTests/testPrepend \
            -only-testing:CoreTests/DequeTests/testPrependAndAppend \
            -only-testing:CoreTests/DequeTests/testRemoveLast \
            -only-testing:CoreTests/DequeTests/testRemoveLastFromSingleElement \
            -only-testing:CoreTests/DequeTests/testExpressibleByArrayLiteral \
            -only-testing:CoreTests/DequeTests/testEquatable \
            -only-testing:CoreTests/DequeTests/testHashable \
            -only-testing:CoreTests/DequeTests/testCapacityGrowth \
            -only-testing:CoreTests/DequeTests/testCapacityShrinking \
            -only-testing:CoreTests/DequeTests/testRemoveFirstZero \
            -only-testing:CoreTests/DequeTests/testRemoveFirstAll \
            -only-testing:CoreTests/DequeTests/testCircularBufferWrapping \
            -only-testing:CoreTests/DequeTests/testPrependMany \
            -only-testing:CoreTests/DequeTests/testCollectionIndices \
            -only-testing:CoreTests/DequeTests/testRandomAccessCollection \
            -only-testing:CoreTests/ExponentialBackoffTests/defaultConfiguration \
            -only-testing:CoreTests/ExponentialBackoffTests/firstAttemptReturnsZero \
            -only-testing:CoreTests/ExponentialBackoffTests/returnsNilWhenExhausted \
            -only-testing:CoreTests/ExponentialBackoffTests/waitTimesIncreaseExponentially \
            -only-testing:CoreTests/ExponentialBackoffTests/waitTimeIsCapped \
            -only-testing:CoreTests/ExponentialBackoffTests/resetClearsState \
            -only-testing:CoreTests/ExponentialBackoffTests/totalWaitTimeAccumulates \
            -only-testing:CoreTests/ExponentialBackoffTests/customConfiguration \
            -only-testing:CoreTests/ExponentialBackoffTests/nanosecondConversion \
            -only-testing:CoreTests/ExponentialBackoffTests/descriptionFormat \
            -only-testing:CoreTests/MusicServiceTests/rawValueMapsForward \
            -only-testing:CoreTests/MusicServiceTests/rawValueParsesReverse \
            -only-testing:CoreTests/MusicServiceTests/unrecognisedRawValueReturnsNil \
            -only-testing:CoreTests/MusicServiceTests/codableRoundTrip \
            -only-testing:CoreTests/MusicServiceTests/codableEmitsRawString \
            -only-testing:CoreTests/MusicServiceTests/allCasesCoversExactlySixServices \
            -only-testing:CoreTests/MusicServiceTests/displayNameMapsCorrectly \
            -disable-concurrent-destination-testing \
            -resultBundlePath CoreTestResults.xcresult

      - name: Summarize test results
        # Surfaces pass/fail/skip counts on every run — including green ones — so the
        # `.disabled(if: WXYC_SKIP_KNOWN_FLAKES)` skip set can't grow invisibly. Each
        # added trait shows up in this summary even when CI is green.
        if: always() && (steps.affected.outputs.xcb_required == 'true' || steps.affected.outputs.run_all == 'true')
        run: |
          {
            echo "## Test summary"
            echo ""
          } >> "$GITHUB_STEP_SUMMARY"
          for bundle in TestResults.xcresult CoreTestResults.xcresult; do
            if [ -d "$bundle" ]; then
              {
                echo "### $bundle"
                echo ""
                echo '```'
                xcrun xcresulttool get test-results summary --path "$bundle" 2>/dev/null | head -40
                echo '```'
                echo ""
              } >> "$GITHUB_STEP_SUMMARY"
            fi
          done
          echo "Skipped tests include any \`.disabled(if: WXYC_SKIP_KNOWN_FLAKES)\` traits — tracked in #371." >> "$GITHUB_STEP_SUMMARY"

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: test-results
          path: |
            TestResults.xcresult
            CoreTestResults.xcresult
          if-no-files-found: ignore
