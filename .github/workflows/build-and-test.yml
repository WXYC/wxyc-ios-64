name: Build and Test

on:
  # Disabled. Run manually via `gh workflow run build-and-test.yml` or the
  # Actions tab. To re-enable, restore the push/pull_request triggers below.
  workflow_dispatch:

# Cancel superseded PR runs (each push to the same PR cancels the prior run).
# Master pushes keep their full audit trail by using a per-event-name group key
# and disabling cancel-in-progress for non-PR events.
concurrency:
  group: build-and-test-${{ github.event_name }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

env:
  SCHEME: WXYC
  TEST_PLAN: WXYC
  # DESTINATION is resolved at runtime by the "Resolve iOS Simulator destination"
  # step below and exported to $GITHUB_ENV. Pinning a device name here (e.g.
  # "iPhone 16 Pro") breaks whenever the runner's Xcode ships a newer default
  # simulator set and drops the pinned model.

jobs:
  build-and-test:
    # Skip drafts — they re-fire on `ready_for_review`. workflow_dispatch and
    # push events have no pull_request context, so the OR keeps them firing.
    if: github.event_name != 'pull_request' || github.event.pull_request.draft == false
    runs-on: macos-latest
    # 30 min absorbs the xcodebuild simulator path's current wall-clock — two
    # recent post-merge runs cancelled at 21 and 23 min with the test suite
    # still mid-run. Trait skips (#377) and the SPM-runnable swift-test step
    # (#368) both fire correctly; the remaining cost is the simulator's
    # cold-start + per-bundle install/launch overhead. Drop back to 20 once #371
    # retires more flake-skipped suites or the sim path shrinks further.
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive
          token: ${{ secrets.SUBMODULE_TOKEN }}
          # fetch-depth: 0 is required for affected-tests.sh's merge-base diff.
          # A shallower clone (e.g., 50) loses the merge-base when origin/master
          # has advanced more than depth-N commits ahead of the branch's fork
          # point, causing `git diff "$BASE_REF"...HEAD` to fail and the script
          # to fall through to run-all.
          fetch-depth: 0

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_26.2.app/Contents/Developer

      - name: Resolve iOS Simulator destination
        # Pick an available iPhone simulator by querying the selected Xcode's
        # runtime instead of pinning a model name that drifts across Xcode
        # versions. Prefer a non-Max "Pro" model (matches prior CI behaviour of
        # testing on iPhone NN Pro), fall back to any available iPhone. Exports
        # DEVICE_ID + DESTINATION (id-based, so no re-lookup by name downstream).
        run: |
          LINE=$(xcrun simctl list devices available | grep -E "iPhone .*Pro " | grep -v "Max" | head -1)
          if [ -z "$LINE" ]; then
            LINE=$(xcrun simctl list devices available | grep -E "iPhone " | head -1)
          fi
          DEVICE_ID=$(printf '%s\n' "$LINE" | grep -oiE '\([0-9A-F-]{36}\)' | head -1 | tr -d '()')
          if [ -z "$DEVICE_ID" ]; then
            echo "No available iPhone simulator found for the selected Xcode." >&2
            xcrun simctl list devices available >&2
            exit 1
          fi
          echo "Resolved simulator:$LINE"
          echo "DEVICE_ID=$DEVICE_ID" >> "$GITHUB_ENV"
          echo "DESTINATION=platform=iOS Simulator,id=$DEVICE_ID" >> "$GITHUB_ENV"

      - name: Set up Swift macro trust
        run: |
          mkdir -p ~/Library/org.swift.swiftpm/security/
          cp ci_scripts/macros.json ~/Library/org.swift.swiftpm/security/

      - name: Cache SwiftPM artifacts
        uses: actions/cache@v4
        with:
          path: |
            ~/Library/Caches/org.swift.swiftpm
            ~/Library/Developer/Xcode/DerivedData/**/SourcePackages
            WXYC.xcodeproj/project.xcworkspace/xcshareddata/swiftpm
          key: spm-${{ runner.os }}-${{ hashFiles('**/Package.resolved') }}
          restore-keys: |
            spm-${{ runner.os }}-

      - name: Cache DerivedData
        # Key intentionally excludes github.sha and *.pbxproj. Including the SHA
        # made the primary key a guaranteed miss on every push; the prefix-
        # fallback restore-keys couldn't compensate because master never wrote
        # a cache that matched. pbxproj was too aggressive an invalidator —
        # most pbxproj edits don't affect compilation. Master pushes now warm
        # a key PRs can restore.
        uses: actions/cache@v4
        with:
          path: ~/Library/Developer/Xcode/DerivedData
          key: derived-${{ runner.os }}-${{ hashFiles('**/Package.resolved', '**/*.xcconfig') }}
          restore-keys: |
            derived-${{ runner.os }}-

      - name: Determine affected tests
        id: affected
        shell: zsh {0}
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            export BASE_REF="origin/${{ github.event.pull_request.base.ref }}"
          fi
          zsh .github/scripts/affected-tests.sh

      - name: swift test SPM-runnable packages
        # Host-runs Swift Testing/XCTest for affected SPM-runnable packages,
        # skipping xcodebuild + simulator. For pure-SPM PRs (xcb_required=false)
        # this is the only test step. For mixed PRs it runs first as an early
        # signal — if it fails, the xcodebuild step below is skipped via fail-fast.
        # Also covers CoreTests when Core is affected, replacing the old
        # hand-enumerated xcodebuild CoreTests step (Swift Testing's host-side
        # scheduler doesn't hit the xcodebuild-simulator parallel-scheduler bug).
        #
        # Per-package skip patterns name tests that work on local macOS but
        # fail on macos-latest's virtualized runner (HEIF/HEVC unsupported via
        # AppleM2ScalerParavirtDriver).
        if: steps.affected.outputs.spm_affected != ''
        run: |
          for pkg in ${{ steps.affected.outputs.spm_affected }}; do
            skip_args=()
            case "$pkg" in
              Core)
                # HEIF/HEVC profile unsupported on virtualized macos-latest
                skip_args=(--skip "ImageCompatibilityTests")
                ;;
            esac
            echo "::group::swift test --package-path Shared/$pkg ${skip_args[*]}"
            swift test --package-path Shared/$pkg "${skip_args[@]}"
            echo "::endgroup::"
          done

      - name: Build for testing
        # Scoped to the affected targets so the build graph shrinks for narrow
        # PRs — xcodebuild only compiles what those test bundles transitively
        # need. On run_all (workflow_dispatch, unknown scope), only_testing_flags
        # is empty and the build covers the full scheme.
        # COMPILER_INDEX_STORE_ENABLE=NO drops index-while-building (CI doesn't
        # use it). SPM resolution runs inline as part of the build — explicit
        # Resolve step is unnecessary, and -disableAutomaticPackageResolution
        # here would fail because the workspace-level Package.resolved is git-
        # ignored and only exists after this step runs.
        if: steps.affected.outputs.xcb_required == 'true' || steps.affected.outputs.run_all == 'true'
        run: |
          ONLY_FLAGS="${{ steps.affected.outputs.only_testing_flags }}"
          xcodebuild build-for-testing \
            -project WXYC.xcodeproj \
            -scheme "$SCHEME" \
            -destination "$DESTINATION" \
            -configuration Debug \
            -skipMacroValidation \
            COMPILER_INDEX_STORE_ENABLE=NO \
            CODE_SIGNING_ALLOWED=NO \
            $ONLY_FLAGS

      - name: Pre-boot simulator
        # Workaround for "The test runner hung before establishing connection."
        # Booting the simulator explicitly before running tests gives CoreSimulator
        # time to fully come up, which the implicit boot inside `xcodebuild test`
        # doesn't reliably do on macos-latest runners under load. Boots the same
        # device resolved in "Resolve iOS Simulator destination".
        if: steps.affected.outputs.xcb_required == 'true' || steps.affected.outputs.run_all == 'true'
        run: |
          echo "Booting $DEVICE_ID"
          xcrun simctl boot "$DEVICE_ID" || true
          xcrun simctl bootstatus "$DEVICE_ID" -b

      - name: Run Tests (except CoreTests and UI)
        # Use -only-testing for affected runs so xcodebuild doesn't install
        # the 16 unaffected bundles onto the sim. Run-all uses the affected
        # step's skip_testing_flags which excludes UI plus every SPM-runnable
        # target (those run via swift test on host).
        # -onlyUsePackageVersionsFromResolvedFile stops the test step re-resolving SPM —
        # log evidence showed ~49s wasted on this per run.
        if: steps.affected.outputs.xcb_required == 'true' || steps.affected.outputs.run_all == 'true'
        env:
          # xcodebuild strips the TEST_RUNNER_ prefix when forwarding env vars to
          # the simulator test runner process, so the .disabled(if:) traits in
          # source check the un-prefixed `WXYC_SKIP_KNOWN_FLAKES`. Scoping at the
          # step (not job) keeps this out of the swift-test step, which runs as a
          # direct host process — `TEST_RUNNER_` prefix-stripping doesn't apply
          # there. Drop along with the traits as #371 retires each suite from the
          # skip set.
          TEST_RUNNER_WXYC_SKIP_KNOWN_FLAKES: '1'
          # WXYC_SKIP_SLOW excludes the >1s test set (UI tests + a handful of
          # timer/network paths) from CI. The full plan locally takes ~91 minutes
          # of which 14 UI tests are 98% of the time; this gate cuts CI back to
          # the fast unit/integration tests. Drop the trait per test as each gets
          # rewritten to run faster than 1s.
          TEST_RUNNER_WXYC_SKIP_SLOW: '1'
        run: |
          if [ "${{ steps.affected.outputs.run_all }}" = "true" ]; then
            ARGS="${{ steps.affected.outputs.skip_testing_flags }}"
          else
            ARGS="${{ steps.affected.outputs.only_testing_flags }}"
          fi
          echo "Test args: $ARGS"

          xcodebuild test-without-building \
            -project WXYC.xcodeproj \
            -scheme "$SCHEME" \
            -testPlan "$TEST_PLAN" \
            -destination "$DESTINATION" \
            -configuration Debug \
            -skipMacroValidation \
            -onlyUsePackageVersionsFromResolvedFile \
            CODE_SIGNING_ALLOWED=NO \
            $ARGS \
            -disable-concurrent-destination-testing \
            -resultBundlePath TestResults.xcresult

      - name: Summarize test results
        # Surfaces pass/fail/skip counts on every run — including green ones — so the
        # `.disabled(if: WXYC_SKIP_KNOWN_FLAKES)` skip set can't grow invisibly. Each
        # added trait shows up in this summary even when CI is green. The swift-test
        # step prints its own pass/fail to the run log; this step covers the
        # xcodebuild side.
        if: always() && (steps.affected.outputs.xcb_required == 'true' || steps.affected.outputs.run_all == 'true')
        run: |
          {
            echo "## Test summary"
            echo ""
          } >> "$GITHUB_STEP_SUMMARY"
          if [ -d "TestResults.xcresult" ]; then
            {
              echo '```'
              xcrun xcresulttool get test-results summary --path "TestResults.xcresult" 2>/dev/null | head -40
              echo '```'
              echo ""
            } >> "$GITHUB_STEP_SUMMARY"
          fi
          echo "Skipped tests include any \`.disabled(if: WXYC_SKIP_KNOWN_FLAKES)\` traits — tracked in #371." >> "$GITHUB_STEP_SUMMARY"

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: test-results
          path: |
            TestResults.xcresult
          if-no-files-found: ignore
