project: WXYC.xcodeproj
schemes:
  # App and extension targets (shared packages are indexed as dependencies)
  - WXYC
  - WXYC TV
  - WatchXYC
  - NowPlayingWidget
  - Request Share Extension
  # Test schemes
  - WXYCTests
  - WXYCUITests

# Reduce false positives
retain_unused_protocol_func_params: true
retain_codable_properties: true
retain_objc_annotated: true
retain_swift_ui_previews: true

# Exclude from results (still indexed, but not reported)
report_exclude:
  - "**/Secrets/**"
  - "**/Vendor/**"
  - "**/LaminatedGlass/**"

# Output format
format: json
